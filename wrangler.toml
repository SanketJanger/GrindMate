name = "grindmate"
main = "src/index.ts"
compatibility_date = "2024-03-01"

# Workers AI binding (Llama 3.3)
[ai]
binding = "AI"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "grindmate-db"
database_id = "73c2b669-abfc-4861-8668-ce96c2c4eecf"

# Durable Objects (Agent state)
[durable_objects]
bindings = [
  { name = "GRINDMATE_AGENT", class_name = "GrindMateAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GrindMateAgent"]

# Serve React frontend from the same origin as the worker
[assets]
directory = "./frontend/dist"
run_worker_first = false

# Environment variables
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://grindmate.sanketjanger15.workers.dev"
